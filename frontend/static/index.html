<!DOCTYPE html>
<html lang="zh-CN" style="background-color:#050912;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 中转站监控面板</title>
  <!-- 内联背景色：防止 pywebview/WebView2 加载瞬间出现白色闪烁，只锁底色不覆盖 background-image -->
  <style>html,body{background-color:#050912!important;color:#f1f5f9;}</style>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <div class="cyber-edge-glow"></div>
  <canvas id="cyber-canvas"></canvas>
  <header class="topbar" onmousedown="if(event.button===0 && event.target.tagName!=='BUTTON' && event.target.tagName!=='INPUT' && !event.target.closest('.actions') && !event.target.closest('.window-controls') && window.pywebview && window.pywebview.api) window.pywebview.api.start_drag()">
    <h1>AI 中转站监控 <span class="sys-badge">[ TELEMETRY ACTIVE ]</span></h1>
    <div class="actions">
      <div class="search-wrapper">
        <div class="search-input-container">
          <input type="text" id="search-input" placeholder="搜索中转站..." autocomplete="off">
          <span class="search-key-tip">/</span>
        </div>
        <div id="search-results" class="search-results-dropdown"></div>
      </div>
      <button id="btn-toggle-all" class="btn-secondary">折叠全部</button>
      <span class="status-dot dot-ok" style="box-shadow: 0 0 12px var(--ok);" title="监控守护中"></span>
      <button id="btn-refresh" class="btn-primary">手动刷新</button>
      <span id="last-updated" class="time-label">--</span>
      
      <!-- 极简科技风原生控制按钮组 -->
      <div class="window-controls">
        <button class="win-btn win-min" onclick="if(window.pywebview && window.pywebview.api) window.pywebview.api.minimize()" title="最小化">—</button>
        <button class="win-btn win-max" onclick="if(window.pywebview && window.pywebview.api) window.pywebview.api.toggle_maximize()" title="最大化/还原">▢</button>
        <button class="win-btn win-close" onclick="if(window.pywebview && window.pywebview.api) window.pywebview.api.close()" title="关闭">✕</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="summary" class="summary-bar">
      <div class="stat">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
        <span class="stat-num" id="stat-total">--</span>
        <span class="stat-label">站点</span>
      </div>
      <div class="stat">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
        <span class="stat-num ok" id="stat-ok">--</span>
        <span class="stat-label">在线</span>
      </div>
      <div class="stat">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
        <span class="stat-num warn" id="stat-warn">--</span>
        <span class="stat-label">需验证 <span class="stat-arrow">▼</span></span>
      </div>
      <div class="stat">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
        <span class="stat-num" id="stat-low">--</span>
        <span class="stat-label">异常 <span class="stat-arrow">▼</span></span>
      </div>
    </section>

    <div id="stat-detail-dropdown" class="stat-dropdown-panel"></div>

    <section id="anomaly-section" class="anomaly-section" style="display:none">
      <h2 class="section-title">⚠ 需验证 / 异常</h2>
      <div id="anomaly-list" class="grid"></div>
    </section>

    <section>
      <h2 class="section-title">已验证在线</h2>
      <div id="station-list" class="grid">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span id="db-path"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
